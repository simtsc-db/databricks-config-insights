resources:
  alerts:
    drift_detected:
      display_name: "[${bundle.target}] Config Drift Detected"
      # Detects configuration drift between the two most recent collection runs
      # and classifies each change as value_changed / added / removed. A grid of
      # (setting x last-two-runs) is left-joined to actual observations so that
      # settings which appeared or disappeared are caught too, not just value
      # changes (the Settings V2 API can add/remove settings over time). The
      # `changed_settings` column lists exactly what changed for the
      # notification. Sentinel values (<unavailable> / <null> / <not-set>)
      # mean the value could not be read reliably, so transitions to/from a
      # sentinel are ignored (only real value changes, true adds, and true
      # removes count). Always returns exactly one row.
      query_text: |
        WITH runs AS (
          SELECT collected_at,
                 DENSE_RANK() OVER (ORDER BY collected_at DESC) AS rnk
          FROM (SELECT DISTINCT collected_at FROM ${var.catalog}.${var.schema}.settings_history)
        ),
        keys AS (
          SELECT DISTINCT setting_name, COALESCE(workspace_id, 0) AS ws
          FROM ${var.catalog}.${var.schema}.settings_history
        ),
        grid AS (
          SELECT k.setting_name, k.ws, r.collected_at, r.rnk
          FROM keys k CROSS JOIN runs r WHERE r.rnk <= 2
        ),
        obs AS (
          SELECT setting_name, COALESCE(workspace_id, 0) AS ws, collected_at,
                 MAX(setting_value) AS setting_value
          FROM ${var.catalog}.${var.schema}.settings_history
          GROUP BY setting_name, COALESCE(workspace_id, 0), collected_at
        ),
        matrix AS (
          SELECT g.setting_name, g.ws, g.rnk, o.setting_value
          FROM grid g
          LEFT JOIN obs o
            ON g.setting_name = o.setting_name AND g.ws = o.ws
           AND g.collected_at = o.collected_at
        ),
        diff AS (
          SELECT setting_name, ws,
                 MAX(CASE WHEN rnk = 1 THEN setting_value END) AS curr_val,
                 MAX(CASE WHEN rnk = 2 THEN setting_value END) AS prev_val
          FROM matrix
          GROUP BY setting_name, ws
        )
        SELECT
          COUNT(*) AS drift_count,
          COALESCE(array_join(collect_list(
            concat(setting_name, ' [ws ', CAST(ws AS STRING), ']: ', change_type,
                   ' (', COALESCE(prev_val, '(none)'), ' -> ',
                   COALESCE(curr_val, '(none)'), ')')
          ), '; '), '') AS changed_settings
        FROM (
          SELECT setting_name, ws, prev_val, curr_val,
                 CASE WHEN prev_val IS NULL AND curr_val IS NOT NULL
                           AND curr_val NOT IN ('<unavailable>', '<null>', '<not-set>') THEN 'added'
                      WHEN prev_val IS NOT NULL
                           AND prev_val NOT IN ('<unavailable>', '<null>', '<not-set>')
                           AND curr_val IS NULL THEN 'removed'
                      ELSE 'value_changed' END AS change_type
          FROM diff
          WHERE (SELECT COUNT(*) FROM runs WHERE rnk >= 2) > 0
            AND ((prev_val IS NOT NULL AND prev_val NOT IN ('<unavailable>', '<null>', '<not-set>')
                  AND curr_val IS NOT NULL AND curr_val NOT IN ('<unavailable>', '<null>', '<not-set>')
                  AND curr_val <> prev_val)
              OR (prev_val IS NULL AND curr_val IS NOT NULL
                  AND curr_val NOT IN ('<unavailable>', '<null>', '<not-set>'))
              OR (prev_val IS NOT NULL AND prev_val NOT IN ('<unavailable>', '<null>', '<not-set>')
                  AND curr_val IS NULL))
        ) c
      warehouse_id: ${var.warehouse_id}
      evaluation:
        comparison_operator: "GREATER_THAN"
        source:
          name: "drift_count"
          display: "drift_count"
        threshold:
          value:
            double_value: 0
        notification:
          notify_on_ok: false
          subscriptions:
            - user_email: "${workspace.current_user.userName}"
      schedule:
        pause_status: "UNPAUSED"
        quartz_cron_schedule: "0 0 7 * * ?"
        timezone_id: "UTC"
      permissions:
        - level: CAN_RUN
          group_name: "users"

    new_preview_enabled:
      display_name: "[${bundle.target}] New Preview Feature Enabled"
      # Fires when a preview feature flips to enabled vs. its previous
      # observation (or appears already enabled on first sight). A single LAG()
      # window compares each preview setting to its own prior snapshot; the
      # preview-phase filter is aligned with the dashboard views. The
      # `enabled_previews` column rides along for the notification. Always
      # returns exactly one row.
      query_text: |
        SELECT
          COUNT(*) AS new_previews,
          COALESCE(array_join(collect_list(
            concat(setting_name, ' [ws ', CAST(ws AS STRING), ']: ',
                   COALESCE(prev_val, '(new)'), ' -> ', COALESCE(curr_val, '(none)'))
          ), '; '), '') AS enabled_previews
        FROM (
          SELECT setting_name,
                 COALESCE(workspace_id, 0) AS ws,
                 setting_value AS curr_val,
                 LAG(setting_value) OVER (
                   PARTITION BY setting_name, COALESCE(workspace_id, 0)
                   ORDER BY collected_at) AS prev_val
          FROM ${var.catalog}.${var.schema}.settings_history
          WHERE preview_phase IS NOT NULL
            AND preview_phase NOT IN ('GA', 'None', '', 'PreviewPhase.GA')
          QUALIFY ROW_NUMBER() OVER (
                    PARTITION BY setting_name, COALESCE(workspace_id, 0)
                    ORDER BY collected_at DESC) = 1
        ) latest
        WHERE LOWER(curr_val) IN ('true', 'enabled', '1', 'on')
          AND (prev_val IS NULL OR LOWER(prev_val) NOT IN ('true', 'enabled', '1', 'on'))
      warehouse_id: ${var.warehouse_id}
      evaluation:
        comparison_operator: "GREATER_THAN"
        source:
          name: "new_previews"
          display: "new_previews"
        threshold:
          value:
            double_value: 0
        notification:
          notify_on_ok: false
          subscriptions:
            - user_email: "${workspace.current_user.userName}"
      schedule:
        pause_status: "UNPAUSED"
        quartz_cron_schedule: "0 0 7 * * ?"
        timezone_id: "UTC"
      permissions:
        - level: CAN_RUN
          group_name: "users"
