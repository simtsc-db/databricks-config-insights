resources:
  jobs:
    config_collector:
      name: "[${bundle.target}] Config Insights - Collector"
      description: >
        Dynamically discovers and collects all account and workspace settings
        via the Settings V2 metadata API. Writes to Delta with schema evolution.
        Lakehouse Monitoring handles drift detection automatically.

      # Runs daily at 06:00 UTC. The monitor refresh (06:30) and the alerts
      # (07:00) are scheduled to run after collection completes.
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "UTC"

      tags:
        project: config-insights

      tasks:
        - task_key: collect_settings
          description: "Discover and collect all settings across the account/workspace"
          python_wheel_task:
            package_name: config_insights
            entry_point: collect
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--schema"
              - ${var.schema}
              - "--account-id"
              - ${var.account_id}
              - "--setup-monitor"
          environment_key: default

      # Serverless compute environment. The collector wheel is built by the
      # `artifacts` block in databricks.yml and installed here.
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.40.0
              - ../../dist/config_insights-0.3.0-py3-none-any.whl

      permissions:
        - level: CAN_VIEW
          group_name: "users"
